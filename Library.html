<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Library membership</title>
</head>

<body>
    <h1>Libray membership</h1>
    <form>
        <label>Full Name:</label>
        <input type="text" Name="username" placeholder="Enter your name">
        <br>
        <br>
        <label>Email:</label>
        <input type="text" Name="username" placeholder="Enter your email">
        <br>
        <br>
        <label>phone Number:</label>
        <input type="text" Name="username" placeholder="Enter your phone Number">
        <br>
        <br>
        <label>Membership Type:</label>
        <br>
        <label for="Student">Student</label>
        <input type="radio" id="female " name="membership" value="male">
        <br>
        <label for="Teacher">Teacher</label>
        <input type="radio" id="female " name="membership" value="male">
        <br>
        <label for="other">Other</label>
        <input type="radio" id="female" name="membership" value="male">
        <br>
        <br>
        <label>Preferred Genre:</label><br>
        <select>
            <option>Select Course</option>
            <option value="Fiction">Fiction</option>
            <option value="Mystery">Mystery</option>
            <option value="Science">Science</option>
            <option value="History">History</option>
        </select>
        <br>
        <br>
        <label>Library Card Number:</label><br>
        <input type="text" placeholder="Enter your address">
        <br>
        <br>
        <label>Address:</label>
        <textarea id="Address" name="Address" rows="4" cols="50"></textarea>
        <br>
        <br>
        <label>Joining Date:</label><br>
        <input type="date" >
        <br>
        <br>
        <input type="Submit" value="Submit">
    </form>
</body>

</html>
